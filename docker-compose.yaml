version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lavanderia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: laundry
      POSTGRES_PASSWORD: laundry_secret
      POSTGRES_DB: lavanderia_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laundry -d lavanderia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
